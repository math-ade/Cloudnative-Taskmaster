<svg width="100%" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg">
  <!-- CloudNative Taskmaster Architecture Diagram -->
  <!-- CI/CD Layer -->
  <rect x="40" y="20" width="600" height="70" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="44" text-anchor="middle" fill="#3C3489">GitHub Actions CI/CD</text>
  <text font-size="12" x="340" y="62" text-anchor="middle" fill="#534AB7">Push to main → CI (test + build) → CD (self-hosted runner → deploy)</text>
  <!-- Docker Compose Layer -->
  <rect x="40" y="120" width="600" height="240" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="146" text-anchor="middle" fill="#085041">Docker Compose — 7 containers</text>
  <text font-size="12" x="340" y="163" text-anchor="middle" fill="#0F6E56">CentOS Stream 10 VM · 192.168.56.50</text>
  <!-- Flask API -->
  <rect x="60" y="178" width="150" height="62" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="135" y="203" text-anchor="middle" fill="#0C447C">Flask API</text>
  <text font-size="12" x="135" y="221" text-anchor="middle" fill="#185FA5">:5000 · /metrics · /health</text>
  <!-- Prometheus -->
  <rect x="232" y="178" width="150" height="62" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="307" y="203" text-anchor="middle" fill="#633806">Prometheus</text>
  <text font-size="12" x="307" y="221" text-anchor="middle" fill="#BA7517">:9091 · scrapes /metrics</text>
  <!-- Grafana -->
  <rect x="404" y="178" width="150" height="62" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="479" y="203" text-anchor="middle" fill="#712B13">Grafana</text>
  <text font-size="12" x="479" y="221" text-anchor="middle" fill="#993C1D">:3000 · dashboards</text>
  <!-- Loki -->
  <rect x="60" y="262" width="150" height="62" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="135" y="287" text-anchor="middle" fill="#0C447C">Loki</text>
  <text font-size="12" x="135" y="305" text-anchor="middle" fill="#185FA5">Log aggregation</text>
  <!-- Promtail -->
  <rect x="232" y="262" width="150" height="62" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="307" y="287" text-anchor="middle" fill="#0C447C">Promtail</text>
  <text font-size="12" x="307" y="305" text-anchor="middle" fill="#185FA5">Log shipping</text>
  <!-- Actions Runner -->
  <rect x="404" y="262" width="150" height="62" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="479" y="287" text-anchor="middle" fill="#444441">Actions Runner</text>
  <text font-size="12" x="479" y="305" text-anchor="middle" fill="#5F5E5A">Self-hosted · systemd</text>
  <!-- Arrows -->
  <line x1="210" y1="209" x2="230" y2="209" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="382" y1="209" x2="402" y2="209" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="232" y1="293" x2="212" y2="293" stroke="#185FA5" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="479" y1="262" x2="479" y2="242" stroke="#993C1D" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="90" x2="340" y2="118" stroke="#534AB7" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="340" y1="362" x2="340" y2="390" stroke="#0F6E56" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- K8s Layer -->
  <rect x="40" y="392" width="600" height="160" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="340" y="418" text-anchor="middle" fill="#27500A">Kubernetes Cluster — kubeadm</text>
  <text font-size="12" x="340" y="436" text-anchor="middle" fill="#3B6D11">Namespace: taskmaster-dev</text>
  <rect x="60" y="450" width="160" height="62" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="140" y="475" text-anchor="middle" fill="#0C447C">API Pods</text>
  <text font-size="12" x="140" y="493" text-anchor="middle" fill="#185FA5">taskmaster-api (scaled)</text>
  <rect x="252" y="450" width="160" height="62" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="332" y="475" text-anchor="middle" fill="#633806">HPA</text>
  <text font-size="12" x="332" y="493" text-anchor="middle" fill="#BA7517">Auto-scales on CPU</text>
  <rect x="444" y="450" width="160" height="62" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" x="524" y="475" text-anchor="middle" fill="#444441">NGINX Ingress</text>
  <text font-size="12" x="524" y="493" text-anchor="middle" fill="#5F5E5A">Traffic routing</text>
  <line x1="252" y1="481" x2="222" y2="481" stroke="#BA7517" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="444" y1="481" x2="412" y2="481" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <!-- Terraform -->
  <rect x="60" y="528" width="560" height="34" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 3"/>
  <text font-size="12" x="340" y="550" text-anchor="middle" fill="#5F5E5A">Terraform — infrastructure provisioning (IaC)</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
