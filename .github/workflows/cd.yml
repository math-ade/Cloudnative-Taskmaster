name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          cd /home/maths/Cloudnative-Taskmaster
          docker compose up -d

      - name: Health check
        run: |
          sleep 5
          curl -f http://localhost:5000/health || exit 1
          echo "✅ Deployment successful"

      - name: Verify metrics
        run: |
          curl -sf http://localhost:5000/metrics | grep taskmaster_requests_total
          echo "✅ Metrics confirmed"
