services:
  api:
    image: taskmaster-api:v1
    container_name: taskmaster-api
    ports:
      - "5000:5000"
    networks:
      - taskmaster-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: taskmaster-frontend:v1
    container_name: taskmaster-frontend
    ports:
      - "8081:80"
    networks:
      - taskmaster-net
    restart: unless-stopped
    depends_on:
      - api

  worker:
    image: taskmaster-worker:v1
    container_name: taskmaster-worker
    networks:
      - taskmaster-net
    restart: unless-stopped
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:latest
    container_name: taskmaster-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - taskmaster-net
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'

  grafana:
    image: grafana/grafana:latest
    container_name: taskmaster-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    networks:
      - taskmaster-net
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:2.9.0
    container_name: taskmaster-loki
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki-data:/loki
    networks:
      - taskmaster-net
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:2.9.0
    container_name: taskmaster-promtail
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - taskmaster-net
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml

networks:
  taskmaster-net:
    driver: bridge

volumes:
  grafana-data:
  loki-data:
