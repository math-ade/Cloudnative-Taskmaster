apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taskmaster-api-hpa
  namespace: taskmaster-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taskmaster-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
