<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudNative Taskmaster</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        h1 { color: #2c3e50; }
        input { padding: 10px; width: 70%; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .task { padding: 10px; margin: 5px 0; background: #f8f9fa; border-left: 4px solid #3498db; border-radius: 4px; }
        .status { color: #27ae60; font-size: 12px; }
    </style>
</head>
<body>
    <h1>CloudNative Taskmaster</h1>
    <p class="status" id="api-status">Checking API...</p>
    <div>
        <input type="text" id="task-input" placeholder="Enter a new task...">
        <button onclick="createTask()">Add Task</button>
    </div>
    <div id="tasks-list" style="margin-top: 20px;"></div>
    <script>
        const API = 'http://localhost:5000';
        async function checkHealth() {
            const res = await fetch(`${API}/health`);
            const data = await res.json();
            document.getElementById('api-status').textContent = `API Status: ${data.status}`;
        }
        async function loadTasks() {
            const res = await fetch(`${API}/tasks`);
            const data = await res.json();
            const list = document.getElementById('tasks-list');
            list.innerHTML = data.tasks.map(t =>
                `<div class="task">#${t.id} — ${t.title} <span class="status">${t.status}</span></div>`
            ).join('');
        }
        async function createTask() {
            const title = document.getElementById('task-input').value;
            await fetch(`${API}/tasks`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title})
            });
            document.getElementById('task-input').value = '';
            loadTasks();
        }
        checkHealth();
        loadTasks();
    </script>
</body>
</html>
